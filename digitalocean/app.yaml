name: mentora
region: nyc

services:
  - name: api
    github:
      repo: mdmakky/Mentora-AI
      branch: main
      deploy_on_push: true
    source_dir: backend
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    build_command: pip install -r requirements.txt
    run_command: uvicorn main:app --host 0.0.0.0 --port 8080
    envs:
      - key: SUPABASE_URL
        value: "${SUPABASE_URL}"
        type: SECRET
      - key: SUPABASE_ANON_KEY
        value: "${SUPABASE_ANON_KEY}"
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "${SUPABASE_SERVICE_ROLE_KEY}"
        type: SECRET
      - key: SUPABASE_DB_URL
        value: "${SUPABASE_DB_URL}"
        type: SECRET
      - key: JWT_SECRET_KEY
        value: "${JWT_SECRET_KEY}"
        type: SECRET
      - key: CLOUDINARY_CLOUD_NAME
        value: "${CLOUDINARY_CLOUD_NAME}"
        type: SECRET
      - key: CLOUDINARY_API_KEY
        value: "${CLOUDINARY_API_KEY}"
        type: SECRET
      - key: CLOUDINARY_API_SECRET
        value: "${CLOUDINARY_API_SECRET}"
        type: SECRET
      - key: GOOGLE_API_KEY
        value: "${GOOGLE_API_KEY}"
        type: SECRET
      - key: FRONTEND_URL
        value: "https://mentora-ai.app"
      - key: BACKEND_URL
        value: "https://mentora-ai.app"

static_sites:
  - name: web
    github:
      repo: mdmakky/Mentora-AI
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm install && npm run build
    output_dir: dist
    catchall_document: index.html

ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: api
    - match:
        path:
          prefix: /
      component:
        name: web

domains:
  - domain: mentora-ai.app
    type: PRIMARY
  - domain: www.mentora-ai.app
    type: ALIAS