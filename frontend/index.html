<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ── -->
    <title>Mentora — AI Study Assistant for University Students</title>
    <meta name="description" content="Mentora is an AI-powered study assistant for university students. Upload PDFs & lecture slides, chat with Gemini AI, track study progress, and ace your exams. Free to get started." />
    <meta name="keywords" content="AI study assistant, university study tool, PDF chat AI, Gemini AI study, lecture notes AI, study tracker, RAG AI, university student app, study smarter, exam preparation AI, Mentora" />
    <meta name="author" content="Mentora" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://mentora-ai.app/" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mentora-ai.app/" />
    <meta property="og:title" content="Mentora — AI Study Assistant for University Students" />
    <meta property="og:description" content="Upload your lecture slides and PDFs. Chat with Gemini AI. Track your study progress and ace your exams. Free to get started." />
    <meta property="og:image" content="https://mentora-ai.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Mentora" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://mentora-ai.app/" />
    <meta name="twitter:title" content="Mentora — AI Study Assistant for University Students" />
    <meta name="twitter:description" content="Upload PDFs, chat with AI, and ace your exams. Free AI-powered study assistant." />
    <meta name="twitter:image" content="https://mentora-ai.app/og-image.png" />

    <!-- ── Favicon & Theme ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#059669" />
    <meta name="msapplication-TileColor" content="#059669" />

    <!-- ── Structured Data (JSON-LD) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Mentora",
      "url": "https://mentora-ai.app",
      "description": "AI-powered study assistant for university students. Upload PDFs, chat with Gemini AI, and track study progress.",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "120"
      }
    }
    </script>

    <!-- ── Preconnect for performance ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
